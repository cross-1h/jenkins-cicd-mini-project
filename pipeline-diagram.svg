<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="920" height="470" fill="#ffffff"/>
  <text x="460" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">What this project covers: CI and the image build</text>

  <!-- Row 1: Developer -> GitHub -> Jenkins -->
  <rect x="60" y="58" width="180" height="64" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e3a8a">You (developer)</text>
  <text x="150" y="108" text-anchor="middle" font-size="12" fill="#475569">pushes code</text>

  <line x1="240" y1="90" x2="302" y2="90" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="271" y="81" text-anchor="middle" font-size="11" fill="#475569">git push</text>

  <rect x="310" y="58" width="180" height="64" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="400" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">GitHub repo</text>
  <text x="400" y="108" text-anchor="middle" font-size="12" fill="#475569">code + Jenkinsfile</text>

  <line x1="490" y1="90" x2="552" y2="90" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="521" y="81" text-anchor="middle" font-size="11" fill="#475569">reads Jenkinsfile</text>

  <rect x="560" y="58" width="180" height="64" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="650" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#5b21b6">Jenkins</text>
  <text x="650" y="108" text-anchor="middle" font-size="12" fill="#475569">runs the pipeline</text>

  <line x1="650" y1="122" x2="650" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CI container -->
  <rect x="40" y="168" width="840" height="120" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="58" y="192" font-size="14" font-weight="bold" fill="#334155">Continuous Integration (what you build in this project)</text>

  <!-- 4 CI stages -->
  <rect x="70" y="210" width="180" height="60" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="2"/>
  <text x="160" y="237" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f6e56">1. Checkout</text>
  <text x="160" y="257" text-anchor="middle" font-size="11" fill="#475569">get the code</text>

  <line x1="250" y1="240" x2="282" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="290" y="210" width="180" height="60" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="2"/>
  <text x="380" y="237" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f6e56">2. Build</text>
  <text x="380" y="257" text-anchor="middle" font-size="11" fill="#475569">install dependencies</text>

  <line x1="470" y1="240" x2="502" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="510" y="210" width="160" height="60" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="2"/>
  <text x="590" y="237" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f6e56">3. Test</text>
  <text x="590" y="257" text-anchor="middle" font-size="11" fill="#475569">run the unit tests</text>

  <line x1="670" y1="240" x2="702" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="710" y="210" width="160" height="60" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="2"/>
  <text x="790" y="237" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f6e56">4. Docker Build</text>
  <text x="790" y="257" text-anchor="middle" font-size="11" fill="#475569">build the image</text>

  <!-- Dashed arrow to CD -->
  <line x1="460" y1="288" x2="460" y2="328" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <!-- CD (next) -->
  <g opacity="0.6">
    <rect x="280" y="332" width="360" height="60" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="460" y="359" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">Continuous Delivery (next project)</text>
    <text x="460" y="379" text-anchor="middle" font-size="12" fill="#475569">push image to a registry, then deploy</text>
  </g>

  <text x="460" y="425" text-anchor="middle" font-size="12" fill="#991b1b" font-weight="bold">If a stage fails, the pipeline STOPS and the later stages never run.</text>
  <text x="460" y="446" text-anchor="middle" font-size="12" fill="#475569">For example, if Test fails, Docker Build is skipped. That is CI protecting you.</text>
</svg>
